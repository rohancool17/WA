<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230d9488%22/><text y=%2270%22 x=%2220%22 font-family=%22sans-serif%22 font-size=%2265%22 font-weight=%22bold%22 fill=%22white%22>V</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vylda - Behind the Mask: Care for the Caregiver. A premium 30-second lifestyle assessment tool for doctor wellness, generating personalized yoga prescriptions." />
    <title>Vylda - Behind the Mask: Care for the Caregiver</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(event) {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; background: #fee2e2; color: #991b1b; font-family: monospace; border: 1px solid #f87171; margin: 20px; border-radius: 8px; text-align: left;">' +
            '<h3>Client-Side Error Captured</h3>' +
            '<p><strong>Message:</strong> ' + event.message + '</p>' +
            '<p><strong>Filename:</strong> ' + event.filename + '</p>' +
            '<p><strong>Line:</strong> ' + event.lineno + ', <strong>Col:</strong> ' + event.colno + '</p>' +
            (event.error && event.error.stack ? '<pre style="white-space: pre-wrap; margin-top: 10px; background: #fca5a5; padding: 10px; border-radius: 4px;">' + event.error.stack + '</pre>' : '') +
            '</div>';
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; background: #fee2e2; color: #991b1b; font-family: monospace; border: 1px solid #f87171; margin: 20px; border-radius: 8px; text-align: left;">' +
            '<h3>Unhandled Promise Rejection</h3>' +
            '<p><strong>Reason:</strong> ' + event.reason + '</p>' +
            '</div>';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
